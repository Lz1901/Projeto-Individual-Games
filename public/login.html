<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Games | Login</title>

    <script src="./js/sessao.js"></script>

  
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body>

 <header class="header">
        <img src="./imagem/GamesLogan.png" alt="Logo">
        <ul>
            <li><a href="index.html">História</a></li>
  
            <li><a href="login.html">Login</a></li>
        </ul>
    </header>

    <div class="login">
        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>
        <div class="container">
            <div class="card card-login">
                <h2>Olá de volta!</h2>
                <div class="formulario">
                    <div class="campo">
                        <span>E-mail:</span>
                        <input id="email_input" type="text" placeholder="seu@email.com">
                    </div>
                    <div class="campo">
                        <span>Senha:</span>
                        <input id="senha_input" type="password" placeholder="******">
                    </div>
                    <button class="botao" onclick="entrar()">Entrar</button>
                </div>

                <p style="font-size: 13px; margin-top: 15px; text-align: center; color: #666;">Não tem conta? <a href="cadastro.html" style="color: rgb(2, 162, 255); font-weight: 600; text-decoration: none;">Cadastre-se aqui</a></p>
            </div>
        </div>
    </div>

   

</body>

</html>

<script>


    function entrar() {
        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        // Validação de campos vazios
        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "Preencha todos os campos para continuar!";
            setTimeout(() => {
                cardErro.style.display = "none";
            }, 3000);
            return false;
        }

        // Validação de formato de e-mail
        if (!emailVar.includes("@") || !emailVar.includes(".")) {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "E-mail inválido! Digite um e-mail válido.";
            setTimeout(() => {
                cardErro.style.display = "none";
            }, 3000);
            return false;
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!");

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.AQUARIOS = JSON.stringify(json.aquarios);

                    console.log("Redirecionando para dashboard...");
                    alert("Login OK! Redirecionando...");
                    window.location.href = "dashboard/dashboard.html";
                });

            } else {
                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    cardErro.style.display = "block";
                    mensagem_erro.innerHTML = "E-mail ou senha incorretos!";
                    finalizarAguardar();
                    setTimeout(() => {
                        cardErro.style.display = "none";
                    }, 3000);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "Erro ao conectar com o servidor!";
            finalizarAguardar();
            setTimeout(() => {
                cardErro.style.display = "none";
            }, 3000);
        });

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
